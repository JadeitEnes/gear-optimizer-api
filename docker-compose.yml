version: "3.8"

services:
 api:
   build: .
   ports:
   - "8000:8000"
   environment:
   - DATABASE_URL=postgresql://postgres:postgres@db:5432/gear_optimizer
   depends_on:
    -db
   volumes:
   - .:/app

   db:
    image: postgres:15-alpine
    environment:
     -POSTGRES_USER=postgres
     -POSTGRES_PASSWORD=postgres
     -POSTGRES_DB=gear_optimizer
    ports:
     -"5432:5432"
    volumes:
     -postgres_data:var/lib/postgresql/data

volumes:
postgres_data:



